name: Daily kakao vision collect

# 매일 KST 04:40 — 카카오 시세표 이미지 다운로드 → Claude API 판독 →
# vision_data 병합 → 전체 재수집·재빌드 → 데이터 커밋·푸시.
# 라이브 반영은 git 미러 모드(컨테이너가 커밋 파일을 주기 다운로드)가 담당 —
# 배포 불필요. 커밋 메시지의 [data-only] 마커가 Lightsail 배포 워크플로를 건너뛰게 함.
on:
  schedule:
    - cron: '40 19 * * *'   # UTC 19:40 = KST 04:40 (다음날)
  workflow_dispatch:

concurrency:
  group: daily-vision
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write   # 데이터 커밋 후 배포 워크플로 직접 호출용
    env:
      TZ: Asia/Seoul
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 셋업
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성
        run: pip install --quiet anthropic requests pillow

      - name: Preflight — ANTHROPIC_API_KEY 확인
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::warning::ANTHROPIC_API_KEY 시크릿 미설정 — 이미지 판독 없이 텍스트 수집만 진행합니다."
          fi

      - name: 1) 신규 시세표 이미지 다운로드 (스킵리스트·상한 적용)
        run: |
          python seongji_vision_batch.py --channels 342 --per-channel 1 \
            --recent-days 30 --max-images 40 || echo "::warning::이미지 다운로드 부분 실패 — 계속"

      - name: 2) Claude API 판독 → vision_data 병합 + 스킵리스트 갱신
        run: python vision_api_reader.py --max-images 40

      - name: 3) 재수집·재빌드 (seed + kakao 텍스트 + vision 적재 + 데이터 JS 생성)
        run: python daily_collect.py finalize

      - name: 4) 데이터 커밋·푸시
        run: |
          git config user.name "vision-bot"
          git config user.email "vision-bot@users.noreply.github.com"
          git add seongji_vision_data.json vision_skiplist.json \
                  seongji_data.js seongji_kakao_history.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "일일 카카오 시세표 자동 수집 $(date +%F) [data-only]

          - Claude API(Vision) 무인 판독 + 텍스트 수집 + 재빌드"
          git push
          echo "COMMITTED=1" >> "$GITHUB_ENV"

      - name: 5) 배포 체인 호출
        # GITHUB_TOKEN 푸시는 워크플로를 트리거하지 못함(재귀 방지) → 직접 dispatch
        if: env.COMMITTED == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-lightsail.yml --ref main
