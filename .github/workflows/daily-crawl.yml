name: Daily subsidy crawl

# 매일 KST 07:00 (UTC 22:00 전날) 에 SKT/KT/LGU+ 공시지원금 크롤 + subsidy_data.js 갱신
on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = KST 07:00 (다음날)
  workflow_dispatch:        # GitHub UI 에서 수동 실행 허용

concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write       # subsidy_data.js commit & push 권한

    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # GITHUB_TOKEN 으로 push 하면 sub-workflow trigger 가 안 됨 — 일단 OK
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # 배포용 (flask) + 크롤러 전용 의존성 모두 설치
          python -m pip install -r requirements.txt -r requirements-crawler.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Initialize SQLite schema
        run: |
          python subsidy_db.py
          # seongji 측은 본 워크플로 범위 외 (별도 PR 에서 자동화)

      - name: Crawl SKT / KT / LGU+
        run: |
          set -e
          python subsidy_crawler.py --carriers SKT KT LGU+
        # 추후 Supabase 연동 시:
        # env:
        #   SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        #   SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Build subsidy_data.js
        run: |
          python subsidy_build.py

      - name: DB summary (검증용)
        run: |
          python - <<'PY'
          import sqlite3, datetime, os
          db = sqlite3.connect("subsidy_offers.db")
          today = datetime.date.today().isoformat()
          cur = db.execute(
              "SELECT carrier, subscription_type, COUNT(*) "
              "FROM subsidy_offers WHERE snapshot_date=? "
              "GROUP BY carrier, subscription_type ORDER BY carrier, subscription_type",
              (today,),
          )
          print(f"=== snapshot {today} ===")
          for row in cur:
              print(f"  {row[0]:5s} {row[1]:7s} {row[2]:4d}")
          # KT 가입유형 동일성 검증
          cur = db.execute("""
              SELECT COUNT(*) FROM (
                SELECT model_name, storage_gb,
                       COUNT(DISTINCT subsidy_public || '|' || subsidy_additional) AS d
                  FROM subsidy_offers
                  WHERE carrier='KT' AND snapshot_date=?
                  GROUP BY model_name, storage_gb HAVING d > 1
              )""", (today,))
          violations = cur.fetchone()[0]
          print(f"KT 가입유형 일관성 위반: {violations} 행 (정상=0)")
          PY

      - name: Guard — require minimum offers before commit
        id: guard
        run: |
          # 추출된 오늘자 offers 가 임계값 미만이면 commit skip (정답값 보호)
          COUNT=$(python - <<'PY'
          import sqlite3, datetime
          db = sqlite3.connect("subsidy_offers.db")
          today = datetime.date.today().isoformat()
          print(db.execute(
              "SELECT COUNT(*) FROM subsidy_offers WHERE snapshot_date=?",
              (today,),
          ).fetchone()[0])
          PY
          )
          echo "today_offers=$COUNT"
          MIN_OFFERS=50
          if [ "$COUNT" -lt "$MIN_OFFERS" ]; then
            echo "::warning::Only $COUNT offers extracted (< $MIN_OFFERS). Skipping commit to protect existing subsidy_data.js."
            echo "skip_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::$COUNT offers extracted — proceeding to commit."
            echo "skip_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push subsidy_data.js
        if: steps.guard.outputs.skip_commit != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add subsidy_data.js
          if git diff --cached --quiet; then
            echo "::notice::No changes to subsidy_data.js — skipping commit"
            exit 0
          fi
          STAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          git commit -m "chore(crawl): refresh subsidy_data.js (${STAMP})

          Auto-generated by .github/workflows/daily-crawl.yml
          - Source: SKT/KT/LGU+ 공시지원금 공식 페이지
          - Crawler: subsidy_crawler.py (Playwright, 가입유형 3패스)"
          git push origin main

      - name: Upload SQLite snapshot as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subsidy-db-${{ github.run_id }}
          path: subsidy_offers.db
          retention-days: 14

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Daily crawl failed. Check Playwright selectors in subsidy_crawler.py against the live 3사 pages."
